<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login — AI Medical Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#d9ecff,#b3d9ff,#e8f3ff);
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      animation:fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    .card{
      width:360px;
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(10px);
      padding:26px;
      border-radius:18px;
      box-shadow:0 12px 35px rgba(0,0,0,0.18);
      animation:pop 0.4s ease;
    }

    @keyframes pop{
      from{transform:scale(0.9);opacity:0}
      to{transform:scale(1);opacity:1}
    }

    .logo{
      text-align:center;
      margin-bottom:15px;
    }
    .logo img{
      width:90px;
      height:auto;
    }

    label{
      font-size:14px;
      font-weight:600;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:5px;
      margin-bottom:16px;
      border-radius:10px;
      border:1px solid #b9c9d6;
      outline:none;
      transition:0.3s;
    }

    input:focus{
      border-color:#2da9ff;
      box-shadow:0 0 6px rgba(45,169,255,0.4);
    }

    .password-box{
      position:relative;
    }
    .toggle{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      font-size:13px;
      color:#2da9ff;
      font-weight:600;
    }

    .btn{
      width:100%;
      padding:12px;
      background:#2da9ff;
      border:none;
      color:white;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      transition:0.25s;
      font-size:15px;
    }

    .btn:hover{
      background:#028eed;
      box-shadow:0 5px 18px rgba(0,145,255,0.3);
    }

    .hint{
      margin-top:12px;
      font-size:12px;
      text-align:center;
      opacity:0.65;
    }

    .shake{
      animation:shake 0.3s;
    }

    @keyframes shake{
      0%{transform:translateX(0)}
      25%{transform:translateX(-5px)}
      50%{transform:translateX(5px)}
      75%{transform:translateX(-5px)}
      100%{transform:translateX(0)}
    }
  </style>
</head>

<body>

  <div class="card" id="loginCard">

    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/6009/6009864.png" alt="Logo">
    </div>

    <h2 style="text-align:center;margin-bottom:15px;">Admin Login</h2>

    <label>Username</label>
    <input id="username" type="text" placeholder="Enter username">

    <label>Password</label>
    <div class="password-box">
      <input id="password" type="password" placeholder="Enter password">
      <span class="toggle" onclick="togglePass()">SHOW</span>
    </div>

    <button class="btn" onclick="login()">Login</button>

    <div class="hint">Default: admin / 1234 (or your updated settings)</div>
  </div>

<script>
function togglePass(){
  let pass = document.getElementById("password");
  let toggle = document.querySelector(".toggle");

  if(pass.type === "password"){
    pass.type = "text";
    toggle.innerText = "HIDE";
  } else {
    pass.type = "password";
    toggle.innerText = "SHOW";
  }
}

/* LOAD SAVED SETTINGS */
let settings = JSON.parse(localStorage.getItem("admin_settings") ||
  JSON.stringify({
    username:"admin",
    password:"1234",
    theme:"dark"
  })
);

/* LOGIN FUNCTION */
function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  const card = document.getElementById("loginCard");

  if (u === settings.username && p === settings.password) {
    sessionStorage.setItem("admin_logged", "yes");
    window.location.href = "{{ url_for('admin_dashboard') }}";
  } 
  else {
    card.classList.add("shake");
    setTimeout(() => card.classList.remove("shake"), 300);
    alert("Incorrect username or password");
  }
}

/* AUTO-REDIRECT IF LOGGED IN */
if (sessionStorage.getItem("admin_logged") === "yes") {
  window.location.href = "{{ url_for('admin_dashboard') }}";
}
</script>

</body>
</html>
