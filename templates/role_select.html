<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Select Role — AI Medical Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#2da9ff;
  --accent2:#7dd3fc;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(900px at 10% 10%,rgba(45,169,255,0.08),transparent),
             linear-gradient(180deg,#020817,#041124);
  color:white;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.box{
  background:rgba(255,255,255,0.05);
  padding:40px 50px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  box-shadow:0 15px 40px rgba(0,0,0,0.55);
  animation:floatUp 1.2s ease;
}
@keyframes floatUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h2{
  margin-bottom:25px;
  font-size:28px;
  font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.role-btn{
  width:260px;
  padding:16px;
  margin:14px 0;
  border:none;
  font-size:18px;
  font-weight:700;
  border-radius:14px;
  cursor:pointer;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#02111b;
  box-shadow:0 10px 28px rgba(45,169,255,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:0.3s;
}

.role-btn:hover{
  transform:translateY(-6px);
  box-shadow:0 16px 40px rgba(45,169,255,0.55);
}

.icon{
  font-size:22px;
}

.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.04);
  filter:blur(40px);
  animation:moveCircle 10s infinite alternate ease-in-out;
}

.circle:nth-child(1){
  width:300px; height:300px;
  top:-80px; left:-120px;
}
.circle:nth-child(2){
  width:250px; height:250px;
  bottom:-60px; right:-100px;
  animation-delay:2s;
}

@keyframes moveCircle{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="box">
  <h2>Select Your Role</h2>

  <button class="role-btn" onclick="goUser()">
    <span class="icon">👤</span> User
  </button>

  <button class="role-btn" onclick="goAdmin()">
    <span class="icon">🛡️</span> Admin
  </button>
</div>

<script>
function goUser(){
  window.location.href = "/home";
}
function goAdmin(){
  window.location.href = "/admin_login";
}
</script>

</body>
</html>
