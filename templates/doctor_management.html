<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Doctor Management — AI Medical Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#020710;
    color:white;
    display:flex;
    height:100vh;
    overflow:hidden;
  }

  /* SIDEBAR */
  .sidebar{
    width:260px;
    background:#081222;
    padding:22px;
    box-shadow:2px 0 25px rgba(0,0,0,0.5);
  }
  .logo-box img{width:75px}

  .menu-item{
    display:block;
    padding:12px 15px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    text-decoration:none;
    transition:0.2s;
  }
  .menu-item:hover{background:rgba(255,255,255,0.15)}
  .menu-item.active{background:#2da9ff;color:black;font-weight:700}

  .btn-red{
    padding:12px;
    background:#ff4c4c;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    margin-top:20px;
  }

  /* MAIN */
  .main{
    flex:1;
    padding:30px;
    overflow-y:auto;
  }

  .btn{
    padding:10px 14px;
    background:#2da9ff;
    border:none;
    color:black;
    font-weight:700;
    border-radius:8px;
    cursor:pointer;
  }

  .card{
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(10px);
    border-radius:16px;
    padding:20px;
    margin-top:25px;
    border:1px solid rgba(255,255,255,0.12);
    animation:fadeUp 0.4s;
  }

  .search{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#0e1c33;
    color:white;
    margin-bottom:15px;
  }

  /* DOCTOR CARDS */
  .doc-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
    margin-top:20px;
  }

  .doc-card{
    background:rgba(255,255,255,0.08);
    border-radius:14px;
    padding:20px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    position:relative;
  }

  .doc-card img{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-bottom:10px;
    border:3px solid #2da9ff;
  }

  .badge{
    background:#2da9ff;
    color:black;
    padding:5px 10px;
    border-radius:6px;
    font-size:12px;
    font-weight:600;
    display:inline-block;
    margin-bottom:10px;
  }

  .actions{
    margin-top:12px;
  }
  .actions .btn{
    width:48%;
    margin:2px;
  }

  /* MODAL */
  #editBox{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.55);
    display:none;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(3px);
  }

  .modal{
    width:420px;
    background:#0b1a2d;
    padding:25px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.15);
    animation:zoomIn 0.25s ease;
  }

  .modal input{
    width:100%;
    padding:10px;
    background:#0e1c33;
    border:none;
    color:white;
    margin-bottom:12px;
    border-radius:8px;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }

  @keyframes zoomIn{
    from{opacity:0;transform:scale(0.85);}
    to{opacity:1;transform:scale(1);}
  }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo-box" style="text-align:center;margin-bottom:25px;">
    <img src="https://cdn-icons-png.flaticon.com/512/6009/6009864.png">
    <h3>Admin Panel</h3>
  </div>

  <a href="{{ url_for('admin_dashboard') }}" class="menu-item">Dashboard</a>
  <a href="{{ url_for('appointment_management') }}" class="menu-item">Appointments</a>
  <a href="{{ url_for('doctor_management') }}" class="menu-item active">Doctors</a>
  <a href="{{ url_for('admin_settings') }}" class="menu-item">Settings</a>

  <div class="btn-red" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main">
  <h1>Doctor Management</h1>

  <!-- ADD BUTTON -->
  <button class="btn" onclick="openAddModal()">+ Add Doctor</button>

  <!-- SEARCH BAR -->
  <input type="text" id="searchBox" class="search" placeholder="Search doctor by name or specialization..." oninput="renderDoctors()">

  <!-- DOCTOR LIST -->
  <div class="card">
    <h3>Doctor Directory</h3>
    <div class="doc-grid" id="doctorGrid"></div>
  </div>

</div>

<!-- ADD/EDIT MODAL -->
<div id="editBox">
  <div class="modal">
    <h3 id="modalTitle">Add Doctor</h3>

    <input type="hidden" id="editId">

    <label>Doctor Name</label>
    <input type="text" id="docName">

    <label>Specialization</label>
    <input type="text" id="docSpec">

    <label>Phone Number</label>
    <input type="text" id="docPhone">

    <label>Photo</label>
    <input type="file" id="docPhoto" accept="image/*">

    <br><br>

    <button class="btn" onclick="saveDoctor()">Save</button>
    <button class="btn-red" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>

/* Login Check */
if (sessionStorage.getItem("admin_logged") !== "yes") {
  window.location.href = "{{ url_for('admin_login') }}";
}

function loadDoctors(){
  return JSON.parse(localStorage.getItem("ai_medical_doctors") || "[]");
}

function saveDoctors(list){
  localStorage.setItem("ai_medical_doctors", JSON.stringify(list));
}

function openAddModal(){
  modalTitle.innerText = "Add Doctor";
  editId.value = "";
  docName.value = "";
  docSpec.value = "";
  docPhone.value = "";
  docPhoto.value = "";
  editBox.style.display="flex";
}

function openEditModal(doc){
  modalTitle.innerText = "Edit Doctor";
  editId.value = doc.id;
  docName.value = doc.name;
  docSpec.value = doc.spec;
  docPhone.value = doc.phone;
  docPhoto.value = "";
  editBox.style.display="flex";
}

function saveDoctor(){
  let name = docName.value.trim();
  let spec = docSpec.value.trim();
  let phone = docPhone.value.trim();
  let id = editId.value;

  if(!name || !spec || !phone){
    alert("Please fill all fields.");
    return;
  }

  let list = loadDoctors();
  let photoBase64 = "";

  let file = docPhoto.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(){
      photoBase64 = reader.result;
      finalizeSave(photoBase64);
    };
    reader.readAsDataURL(file);
  } else {
    finalizeSave("");
  }

  function finalizeSave(photo){
    if(id){
      let d = list.find(x => x.id == id);
      d.name = name;
      d.spec = spec;
      d.phone = phone;
      if(photo) d.photo = photo;
    } else {
      list.push({
        id: Date.now(),
        name,
        spec,
        phone,
        photo
      });
    }

    saveDoctors(list);
    renderDoctors();
    closeModal();
    alert("Doctor saved!");
  }
}

function closeModal(){
  editBox.style.display="none";
}

function deleteDoctor(id){
  if(!confirm("Delete this doctor?")) return;

  let list = loadDoctors().filter(d => d.id != id);
  saveDoctors(list);
  renderDoctors();
}

function renderDoctors(){
  let list = loadDoctors();
  let q = searchBox.value.toLowerCase();

  if(q){
    list = list.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.spec.toLowerCase().includes(q)
    );
  }

  if(!list.length){
    doctorGrid.innerHTML = "<p>No doctors found.</p>";
    return;
  }

  let html = "";

  list.forEach(d => {
    html += `
      <div class="doc-card">
        <img src="${d.photo || 'https://cdn-icons-png.flaticon.com/512/387/387561.png'}">

        <h3>${d.name}</h3>

        <span class="badge">${d.spec}</span>

        <p><b>Phone:</b> ${d.phone}</p>

        <div class="actions">
          <button class="btn" onclick='editDoctor(${d.id})'>Edit</button>
          <button class="btn-red" onclick='deleteDoctor(${d.id})'>Delete</button>
        </div>
      </div>
    `;
  });

  doctorGrid.innerHTML = html;
}

function editDoctor(id){
  let d = loadDoctors().find(x => x.id == id);
  openEditModal(d);
}

renderDoctors();

function logout(){
  sessionStorage.removeItem("admin_logged");
  window.location.href = "{{ url_for('admin_login') }}";
}

</script>

</body>
</html>
